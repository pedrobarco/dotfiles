# ───── OSC ─────
osc=no # disable default osc
# border=no # disable window border

# ───── Video (global; vo/gpu-api can't switch per auto-profile) ─────
vo=gpu # native Cocoa/OpenGL path on macOS; avoids gpu-next/MoltenVK high-refresh drops
hwdec=videotoolbox # hardware decoding on macOS (works with vo=gpu)

# ───── Dither ─────
dither-depth=8 # dither depth for 8-bit output

# ───── Behavior ─────
keep-open=yes # keep the window open after playback ends

# ───── Network resilience (no-op for local files) ─────
stream-lavf-o-append=reconnect=1 # auto-reconnect on network drop
stream-lavf-o-append=reconnect_streamed=1
stream-lavf-o-append=reconnect_delay_max=5

# ───── Screenshots ─────
screenshot-format=png # screenshot format
screenshot-dir="~/Pictures/mpv" # directory to save screenshots
screenshot-template="%F-%p-%n" # %F-%p-%n translates to <filename>-<timestamp>-<sequence_number>
screenshot-high-bit-depth=no # disable high bit depth screenshots

# ───── Language ─────
slang=eng,en # subtitle language
alang=jpn,ja # audio language

# ═════ Local files (auto: path is NOT a URL) ═════
[localfiles]
profile-cond=get("path") and string.find(get("path"), "://") == nil
profile-restore=copy
profile=high-quality # ewa_lanczossharp + anti-ringing (works on vo=gpu)
scale-antiring=0.6 # antiringing scale factor
save-position-on-quit=yes # resume local files where you left off

# ═════ IPTV / network streams (auto: path IS a URL) ═════
[iptv]
profile-cond=get("path") and string.find(get("path"), "://") ~= nil
profile-restore=copy
profile=fast # lighter scaling for live + lower-power rendering
video-sync=audio # present at the stream's rate, not resampled to the display
deinterlace=auto # activates only on flagged-interlaced channels (1080i50 etc.)
hls-bitrate=max # always select the highest-quality HLS variant
cache=yes
cache-secs=30 # ~30s buffer (balanced latency vs. stability)
demuxer-max-bytes=150MiB
demuxer-readahead-secs=20
demuxer-max-back-bytes=50MiB # rewind room without unbounded RAM use
network-timeout=10 # fail/reconnect rather than hang on dead sources
save-position-on-quit=no # live streams have no meaningful resume position
